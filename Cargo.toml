[package]
name = "create-proyect-cli"
version = "2.0.0"
edition = "2021"
authors = ["Carlos Ignacio Olano Mares"]
description = "CLI para crear proyectos rápidamente"
repository= "https://github.com/CARLOSMARES/proyecto-cli"

[package.metadata.wix]
upgrade-guid = "F4A7337F-9A3F-4977-B3D8-3DD36584029A"
path-guid = "538EDC30-D280-482C-923B-81308BD1AFC1"
license = false
eula = false

[dependencies]
inquire = "0.6.2"      # El equivalente exacto a 'inquirer'
spinners = "4.1.1"     # El equivalente a 'ora'
figlet-rs = "0.1.5"    # El equivalente a 'figlet'

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
